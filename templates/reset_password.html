{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 relative">
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-brand-950/50 to-slate-950"></div>
    <div class="absolute top-1/3 left-1/3 w-72 h-72 bg-emerald-500/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{{ url_for('landing') }}" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-2xl font-bold bg-gradient-to-r from-brand-300 to-brand-500 bg-clip-text text-transparent">VerifyEd</span>
            </a>
        </div>
        <div class="glass-card rounded-2xl p-8 border border-white/5">
            <div class="w-14 h-14 mx-auto mb-6 rounded-2xl bg-emerald-500/15 border border-emerald-500/20 flex items-center justify-center">
                <i data-lucide="lock-keyhole" class="w-7 h-7 text-emerald-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white text-center mb-2">Set new password</h2>
            <p class="text-slate-400 text-center text-sm mb-2">Enter the code sent to</p>
            <p class="text-brand-300 text-center text-sm font-semibold mb-6">{{ email }}</p>

            <form method="POST" action="{{ url_for('reset_password_page') }}" class="space-y-5">
                <input type="hidden" name="email" value="{{ email }}">
                <!-- OTP boxes -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2 text-center">Verification Code</label>
                    <div class="flex justify-center gap-2" id="otp-boxes">
                        {% for i in range(1,7) %}
                        <input type="text" name="otp{{ i }}" id="otp{{ i }}" maxlength="1"
                               inputmode="numeric" pattern="[0-9]"
                               class="w-11 h-13 text-center text-lg font-bold rounded-xl border border-white/10
                                      bg-slate-800/60 text-white focus:outline-none focus:border-brand-500
                                      focus:ring-2 focus:ring-brand-500/20 transition-all" required>
                        {% endfor %}
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">New Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" name="new_password" required minlength="6"
                               class="input-field pl-10" placeholder="At least 6 characters"
                               oninput="checkPwStrength(this.value)">
                    </div>
                    <div class="mt-2 space-y-1" id="pw-strength-wrap" style="display:none">
                        <div class="flex gap-1">
                            <div id="ps1" class="h-1 flex-1 rounded-full bg-slate-700 transition-colors"></div>
                            <div id="ps2" class="h-1 flex-1 rounded-full bg-slate-700 transition-colors"></div>
                            <div id="ps3" class="h-1 flex-1 rounded-full bg-slate-700 transition-colors"></div>
                            <div id="ps4" class="h-1 flex-1 rounded-full bg-slate-700 transition-colors"></div>
                        </div>
                        <p id="pw-strength-label" class="text-xs text-slate-500"></p>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Confirm Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" name="confirm_password" required class="input-field pl-10" placeholder="Repeat new password">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-3 text-base">
                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                    Reset Password
                </button>
            </form>
            <p class="text-center text-xs text-slate-500 mt-4">
                <a href="{{ url_for('forgot_password') }}" class="text-brand-400 hover:text-brand-300">Request a new code</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
// OTP box navigation
(function(){
    const inputs = document.querySelectorAll('#otp-boxes input');
    inputs[0] && inputs[0].focus();
    inputs.forEach(function(inp, idx){
        inp.addEventListener('input', function(){
            inp.value = inp.value.replace(/\D/g,'').slice(-1);
            if(inp.value && idx < inputs.length-1) inputs[idx+1].focus();
        });
        inp.addEventListener('keydown', function(e){
            if(e.key==='Backspace' && !inp.value && idx>0) inputs[idx-1].focus();
        });
        inp.addEventListener('paste', function(e){
            e.preventDefault();
            const paste = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
            if(paste.length===6){ inputs.forEach((b,i)=>b.value=paste[i]||''); inputs[5].focus(); }
        });
    });
})();
function checkPwStrength(pw){
    var wrap=document.getElementById('pw-strength-wrap'),label=document.getElementById('pw-strength-label');
    var bars=[document.getElementById('ps1'),document.getElementById('ps2'),document.getElementById('ps3'),document.getElementById('ps4')];
    if(!pw){wrap.style.display='none';return;} wrap.style.display='block';
    var score=0;
    if(pw.length>=8)score++; if(/[A-Z]/.test(pw))score++; if(/[0-9]/.test(pw))score++; if(/[^A-Za-z0-9]/.test(pw))score++;
    var levels=[{color:'bg-red-500',text:'Weak',tc:'text-red-400'},{color:'bg-orange-500',text:'Fair',tc:'text-orange-400'},
                {color:'bg-yellow-500',text:'Good',tc:'text-yellow-400'},{color:'bg-emerald-500',text:'Strong',tc:'text-emerald-400'}];
    var lvl=levels[score-1]||levels[0];
    bars.forEach((b,i)=>b.className='h-1 flex-1 rounded-full transition-colors '+(i<score?lvl.color:'bg-slate-700'));
    label.textContent=lvl.text; label.className='text-xs '+lvl.tc;
}
</script>
{% endblock %}

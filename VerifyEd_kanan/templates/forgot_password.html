{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 relative">
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-brand-950/50 to-slate-950"></div>
    <div class="absolute top-1/3 right-1/3 w-72 h-72 bg-brand-500/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{{ url_for('landing') }}" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-2xl font-bold bg-gradient-to-r from-brand-300 to-brand-500 bg-clip-text text-transparent">VerifyEd</span>
            </a>
        </div>
        <div class="glass-card rounded-2xl p-8 border border-white/5">
            <div class="w-14 h-14 mx-auto mb-6 rounded-2xl bg-amber-500/15 border border-amber-500/20 flex items-center justify-center">
                <i data-lucide="key-round" class="w-7 h-7 text-amber-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white text-center mb-2">Reset your password</h2>
            <p class="text-slate-400 text-center text-sm mb-8">Enter your email and we'll send a reset code.</p>
            <form method="POST" action="{{ url_for('forgot_password') }}" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="email" name="email" required class="input-field pl-10" placeholder="your@email.com" autocomplete="email">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-3 text-base">
                    <i data-lucide="send" class="w-4 h-4"></i>
                    Send Reset Code
                </button>
            </form>
            <p class="text-center text-sm text-slate-400 mt-6">
                Remember it?
                <a href="{{ url_for('login') }}" class="text-brand-400 hover:text-brand-300 font-medium transition-colors">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

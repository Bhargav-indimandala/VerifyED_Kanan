{% extends 'base.html' %}
{% block title %}Confirm Email Change{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="glass-card rounded-2xl p-8 border border-white/5">
        <div class="w-14 h-14 mx-auto mb-6 rounded-2xl bg-brand-500/15 border border-brand-500/20 flex items-center justify-center">
            <i data-lucide="mail-check" class="w-7 h-7 text-brand-400"></i>
        </div>
        <h2 class="text-xl font-bold text-white text-center mb-2">Verify Email Change</h2>
        <p class="text-slate-400 text-center text-sm mb-6">
            Enter the 6-digit code sent to your <span class="text-brand-300 font-medium">current</span> email address.
        </p>
        <form method="POST" action="{{ url_for('confirm_email_change') }}" class="space-y-6">
            <div class="flex justify-center gap-2" id="otp-boxes">
                {% for i in range(1,7) %}
                <input type="text" name="otp{{ i }}" id="otp{{ i }}" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       class="w-11 h-13 text-center text-lg font-bold rounded-xl border border-white/10
                              bg-slate-800/60 text-white focus:outline-none focus:border-brand-500
                              focus:ring-2 focus:ring-brand-500/20 transition-all" required>
                {% endfor %}
            </div>
            <button type="submit" class="btn-primary w-full py-3">
                <i data-lucide="check" class="w-4 h-4"></i>
                Confirm Change
            </button>
        </form>
        <p class="text-center text-xs text-slate-500 mt-4">
            <a href="{{ url_for('profile') }}" class="text-brand-400 hover:text-brand-300">Cancel</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    const inputs=document.querySelectorAll('#otp-boxes input');
    inputs[0]&&inputs[0].focus();
    inputs.forEach(function(inp,idx){
        inp.addEventListener('input',function(){ inp.value=inp.value.replace(/\D/g,'').slice(-1); if(inp.value&&idx<inputs.length-1)inputs[idx+1].focus(); });
        inp.addEventListener('keydown',function(e){ if(e.key==='Backspace'&&!inp.value&&idx>0)inputs[idx-1].focus(); });
        inp.addEventListener('paste',function(e){ e.preventDefault(); const p=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,''); if(p.length===6){inputs.forEach((b,i)=>b.value=p[i]||'');inputs[5].focus();} });
    });
})();
</script>
{% endblock %}

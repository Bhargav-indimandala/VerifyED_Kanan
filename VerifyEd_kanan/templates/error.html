{% extends 'base.html' %}
{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 relative">
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-brand-950/30 to-slate-950"></div>
    <div class="relative z-10 text-center">
        <p class="text-8xl font-black text-brand-500/20 mb-4">{{ code }}</p>
        <h1 class="text-2xl font-bold text-white mb-2">{{ message }}</h1>
        <a href="{{ url_for('landing') }}" class="btn-primary mt-6 inline-flex">
            <i data-lucide="home" class="w-4 h-4"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}

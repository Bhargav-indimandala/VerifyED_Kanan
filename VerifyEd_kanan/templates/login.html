{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 relative">
    <!-- Background -->
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-brand-950/50 to-slate-950"></div>
    <div class="absolute top-1/3 left-1/3 w-72 h-72 bg-brand-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/3 right-1/3 w-56 h-56 bg-violet-500/8 rounded-full blur-3xl"></div>

    <div class="relative z-10 w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="{{ url_for('landing') }}" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-2xl font-bold bg-gradient-to-r from-brand-300 to-brand-500 bg-clip-text text-transparent">VerifyEd</span>
            </a>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-2xl p-8 border border-white/5">
            <h2 class="text-2xl font-bold text-white text-center mb-2">Welcome back</h2>
            <p class="text-slate-400 text-center mb-8 text-sm">Sign in to continue to your dashboard</p>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-5" id="login-form">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="username" name="username" required autocomplete="username"
                               class="input-field pl-10" placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                               class="input-field pl-10" placeholder="Enter your password">
                    </div>
                </div>

                <button type="submit" class="btn-primary w-full py-3 text-base">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{{ url_for('forgot_password') }}" class="text-sm text-slate-400 hover:text-brand-400 transition-colors">
                    <i data-lucide="key-round" class="w-3 h-3 inline-block mr-1"></i>Forgot password?
                </a>
            </div>
            <p class="text-center text-sm text-slate-400 mt-3">
                Don't have an account?
                <a href="{{ url_for('signup') }}" class="text-brand-400 hover:text-brand-300 font-medium transition-colors">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
